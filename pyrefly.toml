# Pyrefly config (examples-monorepo conventions, single-package edition).
project-includes = ["src/**/*", "tools/**/*"]
project-excludes = ["**/__pycache__", "**/.pixi/**"]

python-interpreter-path = ".pixi/envs/dev/bin/python"

# rerun-sdk installs a rerun_sdk.pth that adds a subdirectory to sys.path at
# runtime. Pyrefly doesn't process .pth files, so add the subdirectory explicitly.
site-package-path = [
    ".pixi/envs/dev/lib/python3.13/site-packages",
    ".pixi/envs/dev/lib/python3.13/site-packages/rerun_sdk",
]

# pyrealsense2 lives only in the isolated realsense environment and is an untyped
# C extension either way, so treat it as Any.
replace-imports-with-any = ["pyrealsense2"]
